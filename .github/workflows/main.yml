# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-latest
    strategy:
      matrix:
        include: [{ msystem: MINGW64, arch: x86_64 }]
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          path-type: inherit
          # Target platform
          #platform: x64 # optional, default is x64
          # Install Cygwin packages
          #cygwin: 0 # optional, default is 0
          # Enable static linking workaround
          #static: 0 # optional, default is 1
          # Set up cc/c++ executables
          #cc: 1 # optional, default is 1
          # On Cygwin, replace executable symlinks with hardlinks
          #hardlinks: 1 # optional, default is 0
          install: >-
            base-devel
            mingw-w64-${{matrix.arch}}-toolchain
            mingw-w64-${{matrix.arch}}-openssl

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      # Runs a single command using the runners shell
      - shell: msys2 {0}
        run: |
          autoreconf -iv
          ./configure
          make

      - uses: actions/upload-artifact@v2
        with:
          name: ${{ matrix.msystem }}-packages
          path: C:/_/artifacts/*.pkg.tar.*
