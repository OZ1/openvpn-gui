# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Install MinGW
        # You may pin to the exact commit or the version.
        # uses: egor-tensin/setup-mingw@f3c5d799aadf8fa230ac67a422b01dd085bbc96b
        uses: msys2/setup-msys2@v2
        with:
          update: true
          # Target platform
          #platform: x64 # optional, default is x64
          # Install Cygwin packages
          #cygwin: 0 # optional, default is 0
          # Enable static linking workaround
          #static: 0 # optional, default is 1
          # Set up cc/c++ executables
          #cc: 1 # optional, default is 1
          # On Cygwin, replace executable symlinks with hardlinks
          #hardlinks: 1 # optional, default is 0
          install: >-
            base-devel
            mingw-w64-x86_64-{toolchain,openssl}

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      # Runs a single command using the runners shell
      - name: Build
        run: |
          autoreconf -iv
          ./configure
          make
